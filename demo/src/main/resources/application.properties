spring.application.name=Vettripath

# Optional per-device secrets file in demo/.env.properties
spring.config.import=optional:file:.env.properties

# Uses local PostgreSQL by default; override with Neon env vars when set.
spring.datasource.url=${NEON_JDBC_URL:jdbc:postgresql://localhost:5432/placement_db}
spring.datasource.username=${NEON_DB_USER:postgres}
spring.datasource.password=${NEON_DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.validator.apply_to_ddl=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Mail configuration (set these in .env.properties per device)
spring.mail.host=${APP_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${APP_MAIL_PORT:587}
spring.mail.username=${APP_MAIL_USERNAME:}
spring.mail.password=${APP_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Verification URL configuration
app.verification.base-url=${APP_VERIFICATION_BASE_URL:http://localhost:8080}